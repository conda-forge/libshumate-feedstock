context:
  name: libshumate
  version: "1.6.2"
  version_majmin: ${{ (version | split('.'))[:2] | join('.') }}

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: "https://download.gnome.org/sources/${{ name }}/${{ version_majmin }}/${{ name }}-${{ version }}.tar.xz"
  sha256: 22364bb98f8b520334336ab82240196a0963489b86a5b38328e1bea2b64f3a9e

build:
  number: 0
  skip:
    - win
  script:
    - if: unix
      then: |
        meson setup ${MESON_ARGS} \
            --prefix=$PREFIX \
            --default-library=shared \
            --wrap-mode=nofallback \
            -Dgtk_doc=false \
            -Dvapi=false \
            -Ddemos=false \
            builddir
        ninja -v -C builddir -j ${CPU_COUNT}
        ninja -C builddir install -j ${CPU_COUNT}
  files:
    exclude:
      - '**/gschemas.compiled'
      - '**/icon-theme.cache'
      - '**/loaders.cache'

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - meson
    - ninja
    - pkg-config
    - glib
    - gperf
    - gettext
  host:
    - expat
    - freetype
    - glib
    - gtk4
    - json-glib
    - libsoup
    - libsqlite
    - protobuf-c
    - zlib
  run:
    - protobuf-c
  run_exports:
    - ${{ pin_subpackage('libshumate', upper_bound='x.x') }}
  ignore_run_exports:
    by_name:
      - libexpat
      - adwaita-icon-theme
      - libzlib
      - libfreetype6

tests:
  - package_contents:
      files:
        - if: unix
          then:
            - lib/pkgconfig/shumate-1.0.pc
      lib:
        - if: unix
          then: shumate-1.0

about:
  homepage: https://gitlab.gnome.org/GNOME/libshumate
  summary: libshumate is a GTK4 widget to display maps.
  description: |
    libshumate is a C library providing a GtkWidget to display maps in GTK4
    applications. It supports numerous free map sources such as OpenStreetMap,
    OpenCycleMap, OpenAerialMap and Maps for free.
  license: LGPL-2.1-or-later
  license_file: COPYING
  documentation: https://gnome.pages.gitlab.gnome.org/libshumate/
  repository: https://gitlab.gnome.org/GNOME/libshumate

extra:
  recipe-maintainers:
    - haecker-felix
    - Hofer-Julian
